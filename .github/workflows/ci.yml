name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.1' # You can adjust this if needed
        bundler-cache: true # runs 'bundle install' and caches installed gems automatically

    - name: Run CI Script
      run: script/cibuild
